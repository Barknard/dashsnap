<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #13111C;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #EEEDF5;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #7C5CFC, #22D3EE);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(124, 92, 252, 0.3);
    }
    .logo svg { width: 32px; height: 32px; }

    /* Spinner ring around logo */
    .logo-wrap {
      position: relative;
      width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .spinner {
      position: absolute;
      inset: 0;
      border: 2px solid transparent;
      border-top-color: #7C5CFC;
      border-right-color: #22D3EE;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      margin-top: 16px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #EEEDF5, #A9A5BE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .loader {
      margin-top: 24px;
      width: 200px; height: 3px;
      background: #262435;
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #7C5CFC, #22D3EE);
      border-radius: 2px;
      transition: width 0.4s ease-out;
    }

    .status {
      margin-top: 12px;
      font-size: 11px;
      color: #716D87;
      transition: opacity 0.2s;
      min-height: 16px;
    }

    .version {
      position: absolute;
      bottom: 12px;
      font-size: 9px;
      color: #332F45;
    }

    /* Fade-out when done */
    body.closing {
      animation: fadeOut 0.3s ease-out forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.96); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="spinner"></div>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
    </div>
  </div>
  <h1>DashSnap</h1>
  <div class="loader"><div class="loader-bar" id="bar"></div></div>
  <p class="status" id="status">Starting up...</p>
  <p class="version">v1.11.1</p>
  <script>
    const bar = document.getElementById('bar');
    const status = document.getElementById('status');

    // Listen for progress updates from the main process
    if (window.dashsnapSplash) {
      window.dashsnapSplash.onProgress((percent, message) => {
        bar.style.width = percent + '%';
        if (message) status.textContent = message;
      });
      window.dashsnapSplash.onClosing(() => {
        document.body.classList.add('closing');
      });
    }
  </script>
</body>
</html>
