<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #13111C;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #EEEDF5;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #7C5CFC, #22D3EE);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(124, 92, 252, 0.3);
      animation: float 2s ease-in-out infinite;
    }
    .logo svg { width: 36px; height: 36px; fill: white; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #EEEDF5, #A9A5BE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      margin-top: 6px;
      font-size: 13px;
      color: #716D87;
    }

    .loader {
      margin-top: 32px;
      width: 180px; height: 4px;
      background: #262435;
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #7C5CFC, #22D3EE);
      border-radius: 2px;
      animation: fill 6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }
    @keyframes fill {
      0% { width: 0%; }
      15% { width: 25%; }
      40% { width: 50%; }
      65% { width: 70%; }
      85% { width: 85%; }
      100% { width: 95%; }
    }

    .status {
      margin-top: 14px;
      font-size: 11px;
      color: #4A4560;
    }

    .version {
      position: absolute;
      bottom: 16px;
      font-size: 10px;
      color: #332F45;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
      <circle cx="12" cy="13" r="3"/>
    </svg>
  </div>
  <h1>DashSnap</h1>
  <p class="tagline">Dashboard to Deck</p>
  <div class="loader"><div class="loader-bar"></div></div>
  <p class="status" id="status">Initializing...</p>
  <p class="version">v1.3.0</p>
  <script>
    const messages = [
      [0, 'Initializing...'],
      [800, 'Loading modules...'],
      [2000, 'Setting up browser...'],
      [3500, 'Preparing workspace...'],
      [5000, 'Almost ready...'],
    ];
    messages.forEach(([delay, text]) => {
      setTimeout(() => {
        document.getElementById('status').textContent = text;
      }, delay);
    });
  </script>
</body>
</html>
